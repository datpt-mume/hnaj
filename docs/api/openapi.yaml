openapi: 3.1.0
info:
  title: HNaj API
  version: 0.1.0
  description: >-
    Target HTTP contract for HNaj. Operations are documented before domain
    implementation and are not evidence that the current scaffold implements them.
servers:
  - url: http://localhost:8000/api/v1
    description: Local API target
security: []
tags:
  - name: Auth
  - name: Recommendations
  - name: Tags
  - name: Places
  - name: Favorites
  - name: Reviews
paths:
  /auth/csrf-cookie:
    get:
      tags: [Auth]
      operationId: getCsrfCookie
      summary: Bootstrap the Sanctum CSRF cookie
      responses:
        '204': {description: CSRF cookie issued.}
  /auth/password/forgot:
    post:
      tags: [Auth]
      operationId: requestPasswordReset
      summary: Request a password reset link
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PasswordResetRequest'}
      responses:
        '202': {description: Reset request accepted.}
        '422': {$ref: '#/components/responses/ValidationError'}
  /auth/password/reset:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: Reset a password with a signed token
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PasswordResetConfirmRequest'}
      responses:
        '204': {description: Password reset completed.}
        '422': {$ref: '#/components/responses/ValidationError'}
  /auth/account:
    delete:
      tags: [Auth]
      operationId: deleteAccount
      summary: Delete or anonymize the current account
      security: [{sanctumCookie: []}]
      responses:
        '204': {description: Account deletion completed.}
        '401': {$ref: '#/components/responses/Unauthenticated'}
  /recommendations:
    post:
      tags: [Recommendations]
      operationId: createRecommendation
      summary: Recommend places from a context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendationRequest'
            examples:
              default:
                value:
                  location: {lat: 10.762622, lng: 106.660172}
                  radius_km: 3
                  price_max: 150000
                  tags: [hen-ho, trong-nha]
                  limit: 3
      responses:
        '200':
          description: Recommendation result, including an empty result set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /tags:
    get:
      tags: [Tags]
      operationId: listTags
      summary: List active published tags
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - in: query
          name: search
          schema: {type: string, maxLength: 100}
        - in: query
          name: group
          schema: {type: string, maxLength: 100}
      responses:
        '200':
          description: Paginated tags.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagListResponse'
  /places/{slug}:
    get:
      tags: [Places]
      operationId: getPlaceBySlug
      summary: Get a published place by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema: {type: string, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'}
      responses:
        '200':
          description: Place detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /auth/register:
    post:
      tags: [Auth]
      operationId: registerUser
      summary: Register a regular user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserResponse'}
        '422': {$ref: '#/components/responses/ValidationError'}
  /auth/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: Start an authenticated session
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/LoginRequest'}
      responses:
        '200':
          description: Session started.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserResponse'}
        '422': {$ref: '#/components/responses/ValidationError'}
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logoutUser
      security: [{sanctumCookie: []}]
      responses:
        '204': {description: Session ended.}
        '401': {$ref: '#/components/responses/Unauthenticated'}
  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      security: [{sanctumCookie: []}]
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserResponse'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
  /favorites/{placeId}:
    put:
      tags: [Favorites]
      operationId: addFavorite
      security: [{sanctumCookie: []}]
      parameters:
        - $ref: '#/components/parameters/PlaceId'
      responses:
        '204': {description: Favorite created or already existed.}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      tags: [Favorites]
      operationId: removeFavorite
      security: [{sanctumCookie: []}]
      parameters:
        - $ref: '#/components/parameters/PlaceId'
      responses:
        '204': {description: Favorite removed or already absent.}
        '401': {$ref: '#/components/responses/Unauthenticated'}
  /favorites:
    get:
      tags: [Favorites]
      operationId: listFavorites
      security: [{sanctumCookie: []}]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: User favorites.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PlaceListResponse'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
  /places/{placeId}/reviews:
    post:
      tags: [Reviews]
      operationId: createReview
      security: [{sanctumCookie: []}]
      parameters:
        - $ref: '#/components/parameters/PlaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ReviewRequest'}
      responses:
        '201':
          description: Review created.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ReviewResponse'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '422': {$ref: '#/components/responses/ValidationError'}
    get:
      tags: [Reviews]
      operationId: listPlaceReviews
      parameters:
        - $ref: '#/components/parameters/PlaceId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Published reviews.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ReviewListResponse'}
  /reviews/{reviewId}/reports:
    post:
      tags: [Reviews]
      operationId: reportReview
      summary: Report a published review
      security: [{sanctumCookie: []}]
      parameters:
        - $ref: '#/components/parameters/ReviewId'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ReviewReportRequest'}
      responses:
        '202': {description: Report accepted for moderation.}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '422': {$ref: '#/components/responses/ValidationError'}
  /reviews/{reviewId}/owner-response:
    put:
      tags: [Reviews]
      operationId: upsertOwnerResponse
      summary: Create or replace an owner response
      security: [{sanctumCookie: []}]
      parameters:
        - $ref: '#/components/parameters/ReviewId'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/OwnerResponseRequest'}
      responses:
        '200':
          description: Owner response saved.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/OwnerResponse'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422': {$ref: '#/components/responses/ValidationError'}
components:
  securitySchemes:
    sanctumCookie:
      type: apiKey
      in: cookie
      name: XSRF-TOKEN
      description: Laravel Sanctum SPA session. CSRF bootstrap is required.
  parameters:
    Page:
      in: query
      name: page
      schema: {type: integer, minimum: 1, default: 1}
    PerPage:
      in: query
      name: per_page
      schema: {type: integer, minimum: 1, maximum: 100, default: 20}
    PlaceId:
      in: path
      name: placeId
      required: true
      schema: {$ref: '#/components/schemas/Ulid'}
    ReviewId:
      in: path
      name: reviewId
      required: true
      schema: {$ref: '#/components/schemas/Ulid'}
  responses:
    ValidationError:
      description: Validation failed.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    Unauthenticated:
      description: Authentication required.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    Forbidden:
      description: Authenticated actor lacks permission.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    RateLimited:
      description: Too many requests.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
  schemas:
    Ulid:
      type: string
      pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
    Location:
      type: object
      required: [lat, lng]
      properties:
        lat: {type: number, format: double, minimum: -90, maximum: 90}
        lng: {type: number, format: double, minimum: -180, maximum: 180}
    RecommendationRequest:
      type: object
      required: [location, radius_km, price_max]
      properties:
        location: {$ref: '#/components/schemas/Location'}
        radius_km: {type: number, format: double, minimum: 0.5, maximum: 20}
        price_max: {type: integer, minimum: 0, description: Maximum average price per person in VND.}
        tags:
          type: array
          maxItems: 20
          items: {type: string, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'}
        limit: {type: integer, enum: [1, 3], default: 3}
    RecommendationResponse:
      allOf:
        - {$ref: '#/components/schemas/SuccessResponse'}
        - type: object
          properties:
            data:
              type: object
              required: [places, meta]
              properties:
                places:
                  type: array
                  items: {$ref: '#/components/schemas/Place'}
                meta: {$ref: '#/components/schemas/RecommendationMeta'}
    RecommendationMeta:
      type: object
      required: [total_matched, fallback_applied, fallback_level, query_radius_km, message_key]
      properties:
        total_matched: {type: integer, minimum: 0}
        fallback_applied: {type: boolean}
        fallback_level: {type: integer, minimum: 0, maximum: 5}
        query_radius_km: {type: number, format: double, minimum: 0.5, maximum: 20}
        message_key: {type: string, example: recommendation.results_found}
        relaxed_tags: {type: boolean, default: false}
    Place:
      type: object
      required: [id, name, slug, price_min, price_max, price_display, distance_km, tags, address, rating]
      properties:
        id: {$ref: '#/components/schemas/Ulid'}
        name: {type: string}
        slug: {type: string}
        cover_image: {type: string, format: uri, nullable: true}
        distance_km: {type: number, format: double}
        price_min: {type: integer}
        price_max: {type: integer}
        price_display: {type: string}
        tags:
          type: array
          items: {$ref: '#/components/schemas/Tag'}
        matched_tags:
          type: array
          items: {type: string}
        address: {type: string}
        rating: {type: number, format: double, minimum: 0, maximum: 5}
    Tag:
      type: object
      required: [id, name, slug, group, sort_order]
      properties:
        id: {$ref: '#/components/schemas/Ulid'}
        name: {type: string}
        slug: {type: string}
        group: {type: string}
        icon: {type: string, nullable: true}
        sort_order: {type: integer}
    PlaceResponse:
      allOf:
        - {$ref: '#/components/schemas/SuccessResponse'}
        - type: object
          properties:
            data: {$ref: '#/components/schemas/Place'}
    PlaceListResponse:
      allOf:
        - {$ref: '#/components/schemas/SuccessResponse'}
        - type: object
          properties:
            data:
              type: object
              properties:
                items: {type: array, items: {$ref: '#/components/schemas/Place'}}
                pagination: {$ref: '#/components/schemas/Pagination'}
    TagListResponse:
      allOf:
        - {$ref: '#/components/schemas/SuccessResponse'}
        - type: object
          properties:
            data:
              type: object
              properties:
                items: {type: array, items: {$ref: '#/components/schemas/Tag'}}
                pagination: {$ref: '#/components/schemas/Pagination'}
    Pagination:
      type: object
      required: [current_page, per_page, total, last_page]
      properties:
        current_page: {type: integer}
        per_page: {type: integer}
        total: {type: integer}
        last_page: {type: integer}
    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation]
      properties:
        name: {type: string, minLength: 1, maxLength: 255}
        email: {type: string, format: email}
        password: {type: string, minLength: 8, writeOnly: true}
        password_confirmation: {type: string, writeOnly: true}
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: {type: string, format: email}
        password: {type: string, writeOnly: true}
    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email: {type: string, format: email}
    PasswordResetConfirmRequest:
      type: object
      required: [token, email, password, password_confirmation]
      properties:
        token: {type: string, writeOnly: true}
        email: {type: string, format: email}
        password: {type: string, minLength: 8, writeOnly: true}
        password_confirmation: {type: string, writeOnly: true}
    User:
      type: object
      required: [id, name, email, roles]
      properties:
        id: {$ref: '#/components/schemas/Ulid'}
        name: {type: string}
        email: {type: string, format: email}
        roles: {type: array, items: {type: string}}
    UserResponse:
      allOf:
        - {$ref: '#/components/schemas/SuccessResponse'}
        - type: object
          properties:
            data: {$ref: '#/components/schemas/User'}
    ReviewRequest:
      type: object
      required: [rating]
      properties:
        rating: {type: integer, minimum: 1, maximum: 5}
        body: {type: string, maxLength: 5000}
        experience_tags: {type: array, items: {type: string}}
        media_ids: {type: array, items: {$ref: '#/components/schemas/Ulid'}}
    Review:
      allOf:
        - {$ref: '#/components/schemas/ReviewRequest'}
        - type: object
          required: [id, user_id, created_at]
          properties:
            id: {$ref: '#/components/schemas/Ulid'}
            user_id: {$ref: '#/components/schemas/Ulid'}
            created_at: {type: string, format: date-time}
    ReviewResponse:
      allOf:
        - {$ref: '#/components/schemas/SuccessResponse'}
        - type: object
          properties:
            data: {$ref: '#/components/schemas/Review'}
    ReviewReportRequest:
      type: object
      required: [reason]
      properties:
        reason: {type: string, maxLength: 100}
        details: {type: string, maxLength: 2000}
    OwnerResponseRequest:
      type: object
      required: [body]
      properties:
        body: {type: string, minLength: 1, maxLength: 5000}
    OwnerResponse:
      allOf:
        - {$ref: '#/components/schemas/SuccessResponse'}
        - type: object
          properties:
            data:
              type: object
              required: [id, review_id, user_id, body, created_at]
              properties:
                id: {$ref: '#/components/schemas/Ulid'}
                review_id: {$ref: '#/components/schemas/Ulid'}
                user_id: {$ref: '#/components/schemas/Ulid'}
                body: {type: string}
                created_at: {type: string, format: date-time}
    ReviewListResponse:
      allOf:
        - {$ref: '#/components/schemas/SuccessResponse'}
        - type: object
          properties:
            data:
              type: object
              properties:
                items: {type: array, items: {$ref: '#/components/schemas/Review'}}
                pagination: {$ref: '#/components/schemas/Pagination'}
    SuccessResponse:
      type: object
      required: [success, data]
      properties:
        success: {const: true}
        data: {}
    ErrorDetail:
      type: object
      required: [field, message_key]
      properties:
        field: {type: string}
        message_key: {type: string}
    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success: {const: false}
        error:
          type: object
          required: [code, message_key]
          properties:
            code: {type: string}
            message_key: {type: string}
            details: {type: array, items: {$ref: '#/components/schemas/ErrorDetail'}}
