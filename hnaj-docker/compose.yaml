services:
  backend:
    build:
      context: ..
      dockerfile: hnaj-docker/backend/Dockerfile
      target: development
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-hnaj}
      DB_USERNAME: ${DB_USERNAME:-hnaj}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - ../hnaj-be:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - hnaj

  backend-web:
    image: nginx:1.27-alpine
    volumes:
      - ../hnaj-be:/var/www/html:ro
      - backend_storage:/var/www/html/storage:ro
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8081}:80"
    networks:
      - hnaj

  frontend:
    build:
      context: ..
      dockerfile: hnaj-docker/frontend/Dockerfile
      target: development
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../hnaj-fe:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-8080}:5173"
    networks:
      - hnaj

  mysql:
    image: mysql:8.4
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-hnaj}
      MYSQL_USER: ${DB_USERNAME:-hnaj}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-me-root}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data_v2:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - hnaj

networks:
  hnaj:
    driver: bridge

volumes:
  backend_vendor:
  backend_storage:
  frontend_node_modules:
  mysql_data_v2:
